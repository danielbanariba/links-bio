name: Deploy (disabled — deploy is now local)

# The Metal Archive frontend migrated from Reflex to Astro (web/).
# The Astro build reads reflex.db, which lives ONLY on the local host
# (gitignored), so it cannot be built on a GitHub runner.
#
# Deploy is now done LOCALLY:
#   cd web && npm run build && vercel deploy --prod --prebuilt
# and is wired into links_bio/background_sync.py to run after each YouTube sync.
#
# This workflow no longer auto-deploys on push (that would overwrite the Astro
# site with a stale Reflex export). It runs only on manual dispatch and just
# prints a reminder.

on:
  workflow_dispatch:

jobs:
  info:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy moved to local build
        run: |
          echo "Deploy is now done locally (the Astro build needs reflex.db)."
          echo "Run on the host: cd web && npm run build && vercel deploy --prod --prebuilt"
          echo "Auto-deploy is wired into links_bio/background_sync.py after each sync."
